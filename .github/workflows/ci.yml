name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Per-commit gate: format + lint only (fast, cheap). clippy --all-targets
  # type-checks every bin/test/example across the workspace with -D warnings.
  # `cargo test` runs as the release gate instead (release.yml), and the
  # release's web-cef build exercises the CEF helper/webhost/pack path.
  #
  # The system deps are still required: clippy compiles dependency build
  # scripts (ffmpeg-sys, shaderc-sys, cpal...), which need the headers.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev cmake ninja-build pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libasound2-dev libpulse-dev \
            libwayland-dev libxkbcommon-dev libxcb1-dev \
            libshaderc-dev glslang-dev

      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
