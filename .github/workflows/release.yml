name: Release
# Produces a fully-populated DRAFT release you review and Publish. Kick off from
# Actions -> Release -> Run workflow (optionally type a version; blank = auto).
# It computes the version + changelog, builds three artifacts, and creates the
# draft with all of them + notes attached in one shot.
#
# Artifacts (all with ffmpeg + shaderc statically linked via `--features portable`):
#   kirie              - portable single binary. Only universal dynamic deps
#                        (glibc, alsa, pulse, xcb); runs on any distro (glibc>=2.31).
#   kirie-web-cef      - SINGLE self-extracting file with bundled Chromium: the
#                        engine + the whole CEF runtime (libcef.so, resources,
#                        locales) stripped, compressed and appended behind a
#                        launcher stub. One executable, no runtime dir, no system
#                        browser; self-extracts to cache on first run.
#   kirie-web-webview  - + wry/system webkit2gtk-4.1. Smaller, but REQUIRES the
#                        target to have webkit2gtk-4.1 + libsoup-3.0 installed
#                        (webkit can't be bundled). Built on glibc 2.35.
#                        NOTE: webkit2gtk has NO offscreen-rendering path
#                        (upstream won't-fix), so web wallpapers cannot
#                        composite in this variant - it is scenes/video only.
#                        Prefer kirie-web-cef for working web wallpapers.
#
# No Windows artifacts: kirie's presentation layer is Linux-native (Wayland
# wlr-layer-shell + X11 fallback, PulseAudio, memfd) - on Windows the original
# Wallpaper Engine is the native app. A Windows port would be a new platform
# backend, not a packaging change.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v0.2.0. Blank = auto-detect from Conventional Commits."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Version + changelog; publish RELEASE_NOTES.md as an artifact.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          input="${{ inputs.version }}"
          if [ -n "$input" ]; then
            version="$input"; case "$version" in v*) ;; *) version="v$version" ;; esac
          else
            raw="$(git cliff --bumped-version 2>/dev/null || true)"
            ver="${raw#v}"; if [ -z "$ver" ] || [ "$ver" = "0.0.0" ]; then ver="0.1.0"; fi
            version="v$ver"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"
      - name: Generate changelog
        run: git cliff --unreleased --tag "${{ steps.version.outputs.version }}" --strip all -o RELEASE_NOTES.md
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error

  # 2. Build the three variants. ffmpeg + shaderc are compiled from source and
  #    statically linked (the `portable` feature) in all of them. default + web-cef
  #    build on debian:11 (glibc 2.31 floor); web-webview builds on ubuntu:22.04,
  #    which ships webkit2gtk-4.1 (debian:11 only has 4.0). fail-fast:false so one
  #    variant failing never blocks the others.
  build:
    needs: prepare
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            container: debian:11
            features: portable
            artifact: kirie
          - variant: web-cef
            container: debian:11
            features: portable,web-cef
            artifact: kirie-web-cef
          - variant: web-webview
            container: ubuntu:22.04
            features: portable,web-webview
            artifact: kirie-web-webview
    name: build (${{ matrix.variant }})
    defaults:
      run:
        shell: bash
    steps:
      # Toolchain + build deps for the from-source static libs (nasm for ffmpeg;
      # cmake/ninja/git/python for shaderc) and the -dev packages for the libs
      # that stay dynamic. cmake comes from pip (<4) because debian:11's is 3.18
      # but shaderc's SPIRV-Tools needs >=3.22.1.
      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential clang ninja-build nasm git curl ca-certificates \
            pkg-config python3 python3-pip \
            libasound2-dev libpulse-dev \
            libxcb1-dev libwayland-dev libxkbcommon-dev libx11-dev libdbus-1-dev
          if [ "${{ matrix.variant }}" = "web-webview" ]; then
            apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libsoup-3.0-dev
          fi
          pip3 install "cmake<4"
          cmake --version
      - name: Install Rust (rustup, current stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: portable-${{ matrix.variant }}
          cache-on-failure: true
      - name: Set crate version
        run: |
          v="${{ needs.prepare.outputs.version }}"; v="${v#v}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml
      - name: Build (${{ matrix.variant }})
        run: cargo build --release -p kirie --features ${{ matrix.features }}
      # The CEF subprocess helper + the out-of-process web host are separate
      # binaries that link libcef; the engine itself no longer does (the
      # browser runs in the killable kirie-webhost child, frames via shm).
      # kirie-pack refuses to pack without BOTH beside libcef.
      - name: Build CEF helper + web host (web-cef only)
        if: matrix.variant == 'web-cef'
        run: |
          cargo build --release -p kirie-web --features cef --bin kirie-cef-helper
          cargo build --release -p kirie-web --features cef --bin kirie-webhost
      # Guard: ffmpeg + shaderc must be static in every variant. The ENGINE
      # must also never link libcef anymore (the browser is out-of-process in
      # kirie-webhost); webkit stays an expected dynamic dep of the webview
      # variant only.
      - name: Verify ffmpeg + shaderc are static
        run: |
          set -euo pipefail
          apt-get install -y --no-install-recommends binutils >/dev/null
          needed="$(readelf -d target/release/kirie | grep NEEDED || true)"
          echo "$needed"
          if echo "$needed" | grep -iqE 'libav|libsw|shaderc|glslang'; then
            echo "::error::churny soname present — ffmpeg/shaderc not static"; exit 1
          fi
          if echo "$needed" | grep -iq 'libcef'; then
            echo "::error::engine links libcef — the browser must stay out-of-process (kirie-webhost)"; exit 1
          fi
          echo "ok: ffmpeg + shaderc static; no libcef in the engine"
      # Package. web-cef is shipped as a SINGLE self-extracting file: kirie-pack
      # stages the engine + CEF runtime (libcef.so, ANGLE/swiftshader libs,
      # icudtl.dat, *.pak, v8 snapshot, locales), strips debug symbols (libcef
      # ships unstripped at ~1.3 GB → ~245 MB), trims locales to en-US, and packs
      # it behind the launcher stub. One executable, no runtime dir, no
      # LD_LIBRARY_PATH — it self-extracts to cache on first run. default +
      # web-webview stay plain-binary tarballs.
      - name: Package (${{ matrix.variant }})
        id: package
        run: |
          set -euo pipefail
          if [ "${{ matrix.variant }}" = "web-cef" ]; then
            cargo build --release -p kirie-launcher
            asset="${{ matrix.artifact }}-linux-x86_64"
            ./target/release/kirie-pack target/release "$asset"
            chmod +x "$asset"
          else
            dist="dist/${{ matrix.artifact }}"
            mkdir -p "$dist"
            cp target/release/kirie "$dist/${{ matrix.artifact }}"
            cp README.md LICENSE "$dist/" 2>/dev/null || true
            if [ "${{ matrix.variant }}" = "web-webview" ]; then
              printf 'Requires webkit2gtk-4.1 and libsoup-3.0 installed on the system.\nDebian/Ubuntu: apt install libwebkit2gtk-4.1-0 libsoup-3.0-0\nArch: pacman -S webkit2gtk-4.1 libsoup3\n\nLIMITATION: webkit2gtk has no offscreen-rendering path (upstream wont-fix),\nso WEB wallpapers cannot render in this variant - scenes/video/images only.\nUse the kirie-web-cef single-file build for web wallpapers.\n' > "$dist/REQUIREMENTS.txt"
            fi
            asset="${{ matrix.artifact }}-linux-x86_64.tar.gz"
            tar -C dist -czf "$asset" "${{ matrix.artifact }}"
          fi
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-linux-x86_64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  # 3. Create/update the draft release once, with all built artifacts + notes.
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      V: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-linux-x86_64"
          merge-multiple: true
      - name: Create or update the draft release
        run: |
          set -euo pipefail
          # Tarballs (default, web-webview) + the raw self-extracting web-cef
          # single file (no extension).
          files=$(ls *-linux-x86_64*)
          echo "attaching:"; echo "$files"
          # No checkout here, so gh must stay API-only: GH_REPO gives the repo and
          # --target gives create an explicit commit. Update in place if it exists.
          if gh release view "$V" >/dev/null 2>&1; then
            echo "release $V exists — updating in place (not deleting)"
            gh release edit "$V" --draft --title "$V" --notes-file RELEASE_NOTES.md
            gh release upload "$V" $files --clobber
          else
            echo "creating draft $V"
            gh release create "$V" --draft --title "$V" --target "$GITHUB_SHA" \
              --notes-file RELEASE_NOTES.md $files
          fi
          echo "Draft $V ready with all artifacts attached."
